services:
  nginx : 
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    depends_on:
      - frontend
      - backend
  backend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: be.dockerfile
    ports:
      - 81:80
      - 5173:5173
    volumes:
      - ./be:/var/www
      - ./be/public:/var/www/html
      - ./fe:/var/www/resources/react
    networks:
      - app-network
  frontend:
    tty: true
    restart: unless-stopped
    build:
      context: .
      dockerfile: frontend.dockerfile
    ports:
      - 3000:3000
    volumes:
      - ./frontend:/app
    networks:
      - app-network
  full_version:
    tty: true
    restart: unless-stopped
    build:
      context: .
      dockerfile: frontend.dockerfile
    ports:
      - 3002:3000
    volumes:
      - ./full-version:/app
    networks:
      - app-network
    command: 'npm run dev'
networks:
  app-network:
    driver: bridge